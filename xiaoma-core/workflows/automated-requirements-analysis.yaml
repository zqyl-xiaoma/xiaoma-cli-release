          validation_criteria:
            - epic_scope_clearly_defined
            - user_stories_identified
            - technical_design_outlined
            - database_changes_listed
            - api_endpoints_listed
            - acceptance_criteria_defined
            - effort_estimated
            - risks_identified

          output:
