# <!-- Powered by XIAOMA™ Core -->
workflow:
  id: automated-requirements-analysis
  name: 自动化需求分析和架构设计流程
  description: >-
    从 req.txt 需求文档到 PRD 生成和 Epic 拆分的全自动化流程。
    包含现有架构分析、PRD 创建、Epic 拆分、技术架构设计等完整环节。
    适用于现有 Java 后端项目的迭代需求开发（Brownfield 项目）。
  type: automated-requirements-analysis
  project_types:
    - java-backend
    - brownfield-project
    - enterprise-app
    - api-first

  # 工作流增强特性
  optimizations:
    - existing_architecture_analysis: true
    - brownfield_prd_creation: true
    - automatic_epic_sharding: true
    - incremental_architecture_design: true
    - quality_self_validation: true

  sequence:
    # ================================
    # 🆕 前置步骤：环境和依赖验证
    # ================================
    - step: pre_workflow_validation
      action: validate_environment_and_dependencies
      run_once: true
      duration: 1m
      detailed_steps:
        - step: check_req_file
          description: "验证 req.txt 需求文档是否存在"
          required_files:
            - docs/req.txt
          on_missing:
            action: halt_workflow
            message: "❌ 未找到 docs/req.txt 文件，请确保产品经理已提供需求文档"

        - step: check_project_structure
          description: "验证项目基本结构"
          required_directories:
            - src/
            - docs/
          validation:
            - check_java_source_exists
            - check_pom_or_gradle_exists
          on_missing:
            action: halt_workflow
            message: "❌ 项目结构不完整，请确保这是一个有效的 Java 项目"

        - step: check_xiaoma_core_installed
          description: "验证 xiaoma-core 是否已安装"
          required_directories:
            - .xiaoma-core/
          on_missing:
            action: halt_workflow
            message: "❌ 未检测到 .xiaoma-core/ 目录，请先运行 'npm run install:xiaoma' 安装"

        - step: create_required_directories
          description: "创建必要的文档目录结构"
          action: create_if_missing
          directories:
            - docs/requirements/
            - docs/prd/
            - docs/architecture/
            - docs/epics/
            - docs/stories/
          notes: "自动创建需求分析所需的文档目录"

      on_success:
        message: "✅ 环境验证通过，开始自动化需求分析流程"
      on_failure:
        action: halt_with_instructions
        instructions: |
          ❌ 环境验证失败，请完成以下前置工作：
          1. 确保 docs/req.txt 文件存在且包含 PM 提供的需求
          2. 确保项目是有效的 Java 项目（包含 src/ 和 pom.xml）
          3. 运行 'npm run install:xiaoma' 安装 xiaoma-core
          4. 确保所有依赖就绪后重新启动工作流

    # ================================
    # 第1步：Analyst 需求分析和澄清
    # ================================
    - step: requirements_analysis_and_elicitation
      agent: analyst
      action: analyze_and_clarify_requirements
      duration: 15-25m
      detailed_steps:
        - step: switch_to_analyst_agent
          command: "/analyst"
          description: "切换到 Analyst（业务分析师）智能体"
          notes: "激活业务分析师角色，准备分析和澄清需求"

        - step: analyze_requirements
          action: execute_requirements_analysis
          input:
            - req_file: "docs/req.txt"
          prompt_template: |
            我需要对产品经理提供的需求文档进行深度分析和澄清。

            **需求文档**：
            请阅读当前项目的 docs/req.txt 文件内容

            **分析任务**：
            1. 需求理解和解析
               - 识别业务目标和价值主张
               - 提取核心功能需求
               - 识别非功能需求（性能、安全、兼容性）
               - 识别隐含需求和假设

            2. 需求澄清和细化
               - 识别模糊或不清晰的需求点
               - 提出澄清问题（假设用户回答）
               - 补充缺失的需求细节
               - 明确需求优先级

            3. 用户和场景分析
               - 识别目标用户角色
               - 分析典型使用场景
               - 绘制用户旅程地图

            4. 需求分类和结构化
               - 按功能模块分类需求
               - 识别需求间的依赖关系
               - 评估需求复杂度
               - 建议实施优先级

            5. 风险和约束识别
               - 识别业务风险
               - 识别技术约束
               - 识别资源约束
               - 提出风险缓解建议

            **输出要求**：
            请生成一份结构化的需求分析报告，包含：

            ## 1. 需求概览
            - 项目背景和目标
            - 业务价值主张
            - 核心功能摘要

            ## 2. 需求分类清单
            - 功能需求（按模块分类）
            - 非功能需求
            - 数据需求
            - 接口需求
            - 约束条件

            ## 3. 用户和场景
            - 目标用户角色定义
            - 典型使用场景
            - 用户旅程地图

            ## 4. 需求澄清记录
            - 原始需求中的不明确点
            - 澄清后的明确需求
            - 补充的需求细节

            ## 5. 需求优先级
            - 高优先级需求（Must Have）
            - 中优先级需求（Should Have）
            - 低优先级需求（Could Have）
            - 未来考虑（Won't Have This Time）

            ## 6. 依赖关系分析
            - 功能依赖关系图
            - 技术依赖识别
            - 数据依赖识别

            ## 7. 风险和约束
            - 识别的业务风险
            - 识别的技术约束
            - 资源和时间约束
            - 风险缓解建议

            ## 8. 实施建议
            - 建议的开发阶段划分
            - MVP（最小可行产品）范围
            - 迭代计划建议

            **保存位置**：`docs/requirements/requirements-analysis.md`

          execution_process:
            phase_1: parse_and_understand_requirements
            phase_2: identify_ambiguities_and_gaps
            phase_3: clarify_and_refine_requirements
            phase_4: classify_and_structure_requirements
            phase_5: analyze_users_and_scenarios
            phase_6: identify_dependencies_and_priorities
            phase_7: assess_risks_and_constraints
            phase_8: generate_analysis_report

          validation_criteria:
            - all_requirements_captured
            - ambiguities_clarified
            - requirements_classified
            - users_and_scenarios_defined
            - priorities_assigned
            - dependencies_identified
            - risks_assessed

          output:
            file: "docs/requirements/requirements-analysis.md"
            format: "structured_markdown"
            sections:
              - requirements_overview
              - classified_requirements
              - users_and_scenarios
              - clarification_records
              - priority_ranking
              - dependency_analysis
              - risks_and_constraints
              - implementation_recommendations

          notes: |
            Analyst 进行需求分析的关键任务：
            - 深度理解 req.txt 中的原始需求
            - 识别并澄清模糊不清的需求点
            - 补充隐含需求和缺失细节
            - 结构化分类需求
            - 分析用户和使用场景
            - 识别依赖关系和优先级
            - 评估风险和约束

            此步骤为后续 PRD 创建提供清晰的需求基础。

        - step: create_project_brief_optional
          command: "*create-project-brief"
          description: "可选：创建项目简报"
          optional: true
          prompt_template: |
            基于需求分析，创建一份简洁的项目简报。

            **任务要求**：
            请执行 *create-project-brief 命令，生成项目简报文档。

            **项目简报应包含**：
            1. 项目概述（1-2段）
            2. 业务目标和成功标准
            3. 核心功能清单（项目符号）
            4. 目标用户和使用场景
            5. 关键里程碑和时间线
            6. 主要风险和缓解措施
            7. 资源需求概要

            请执行命令。

          notes: |
            项目简报是可选步骤，适用于：
            - 需要向利益相关者汇报的情况
            - 需要快速概览项目全貌
            - 作为 PRD 的高层摘要

        - step: validate_analysis_quality
          action: self_review_analysis_quality
          prompt_template: |
            请审查刚才创建的需求分析报告，确认：

            **完整性检查**：
            1. ✓ 所有需求都已从 req.txt 中提取
            2. ✓ 需求分类清晰完整
            3. ✓ 用户角色和场景已定义
            4. ✓ 需求优先级已明确
            5. ✓ 依赖关系已识别
            6. ✓ 风险和约束已评估

            **质量检查**：
            7. ✓ 需求描述清晰无歧义
            8. ✓ 模糊需求已澄清
            9. ✓ 隐含需求已显性化
            10. ✓ 需求可测量可验证
            11. ✓ 实施建议合理可行

            如果有遗漏或不清晰的地方，请指出并补充。
            如果所有检查项都通过，请确认需求分析质量合格。

          validation_process:
            step_1: completeness_check
            step_2: clarity_check
            step_3: priority_validation
            step_4: dependency_validation
            step_5: risk_assessment_validation

          quality_criteria:
            - requirements_completeness: "100%"
            - clarity_score: ">=9/10"
            - priority_coverage: "100%"
            - dependency_mapping: ">=90%"

          on_issues_found:
            action: refine_analysis
            max_iterations: 2
            notes: "Analyst 自我修正需求分析中发现的问题"

          on_all_checks_passed:
            action: mark_analysis_validated
            message: "✅ 需求分析质量检查通过，准备架构分析"

          notes: |
            Analyst 自检需求分析质量：
            - 确保需求完整覆盖
            - 验证需求清晰度
            - 确认优先级合理
            - 检查依赖关系完整

            质量标准：
            - 需求完整性 100%
            - 清晰度评分 ≥9/10
            - 优先级覆盖 100%
            - 依赖映射 ≥90%

      validation_criteria:
        - requirements_analysis_complete
        - all_requirements_extracted
        - ambiguities_resolved
        - requirements_classified
        - priorities_assigned
        - dependencies_mapped
        - risks_identified
        - quality_self_check_passed
        - file_created: "docs/requirements/requirements-analysis.md"

      on_failure:
        action: retry_analysis
        max_retries: 2
        escalation: "需求分析失败，需要人工审查 req.txt 的质量"

      on_success:
        action: proceed_to_architecture_analysis
        message: "✅ 需求分析完成，准备分析现有架构"

      notes: |
        Analyst 进行需求分析的完整流程：
        1. 执行 /analyst 切换到业务分析师智能体
        2. 读取并深度分析 docs/req.txt
        3. 识别并澄清模糊需求
        4. 结构化分类需求（功能、非功能、数据、接口）
        5. 分析用户和使用场景
        6. 确定需求优先级和依赖关系
        7. 识别风险和约束
        8. 可选：创建项目简报
        9. 自检需求分析质量
        10. 保存到 docs/requirements/requirements-analysis.md

        关键输出：
        - 结构化的需求分析报告
        - 明确的需求分类和优先级
        - 用户角色和场景定义
        - 依赖关系图
        - 风险和约束清单

        此步骤为 PM 创建 PRD 提供清晰的需求基础。

    # ================================
    # 第2步：Architect 分析现有架构
    # ================================
    - step: analyze_existing_architecture
      agent: architect
      action: analyze_current_system_architecture
      duration: 10-20m
      detailed_steps:
        - step: switch_to_architect_agent
          command: "/architect"
          description: "切换到 Architect 智能体"
          notes: "激活架构师角色，准备分析现有系统架构"

        - step: analyze_architecture
          action: execute_architecture_analysis
          input:
            - project_source_code: "src/"
            - project_config: "pom.xml"
            - existing_docs: "docs/"
          prompt_template: |
            请分析当前项目的后端架构。

            **项目信息**：
            - 项目类型：Java 后端项目（现有代码库）
            - 项目路径：{project_root}
            - 技术栈：从项目配置文件中自动识别

            **分析任务**：
            1. 扫描项目目录结构
               - 识别源码组织方式（Maven）
               - 识别包结构和分层架构

            2. 识别技术栈和框架
               - Spring Boot 版本
               - 持久化框架（MyBatis/MyBatis-Plus/JPA/Hibernate）
               - 数据库类型和版本（MySQL/PostgreSQL等）
               - 其他关键依赖（Redis/Kafka/等）

            3. 分析现有数据库设计
               - 扫描 Entity/Model 类
               - 识别现有数据表清单（可以检查有无数据库链接的 mcp 服务，如果有，可以从数据库链接的 mcp 服务中获取现有数据表清单，如果没有，则从 Entity/Model 类中获取）
               - 分析表之间的关联关系
               - 识别数据库命名规范

            4. 识别现有 API 端点
               - 扫描 Controller 类
               - 提取 RESTful API 端点清单
               - 分析 API 版本策略
               - 识别请求/响应 DTO 模式

            5. 总结架构模式和设计原则
               - 分层架构分析（Controller-Application(如有此层)-Service-Mapper/Repository）
               - 事务管理策略
               - 异常处理机制
               - 安全认证/授权方式
               - 日志记录规范
               - 代码风格和命名约定

            **输出要求**：
            请生成一份结构化的架构分析报告，包含：

            ## 1. 项目概览
            - 项目名称
            - 技术栈版本清单
            - 项目规模统计（类数量、接口数量等）

            ## 2. 技术架构
            - 框架和依赖清单
            - 分层架构说明
            - 关键技术组件

            ## 3. 数据库架构
            - 数据库类型和版本
            - 现有数据表清单（表名、用途、主要字段）
            - ER 关系说明
            - 数据库设计模式

            ## 4. API 架构
            - API 模块清单
            - RESTful 端点统计
            - API 版本策略
            - 请求/响应规范

            ## 5. 代码组织
            - 包结构说明
            - 分层职责定义
            - 公共组件和工具类

            ## 6. 架构特点和注意事项
            - 遵循的设计原则
            - 编码规范要点
            - 技术约束
            - 已知技术债务

            ## 7. 迭代开发建议
            - 新增功能的集成点
            - 需要遵循的规范
            - 兼容性注意事项

            **保存位置**：`docs/architecture/current-architecture-analysis.md`

          execution_process:
            phase_1: scan_project_structure
            phase_2: identify_tech_stack
            phase_3: analyze_database_design
            phase_4: extract_api_endpoints
            phase_5: summarize_architecture_patterns
            phase_6: generate_analysis_report

          validation_criteria:
            - tech_stack_identified
            - database_entities_listed
            - api_endpoints_documented
            - architecture_patterns_described
            - coding_standards_documented

          output:
            file: "docs/architecture/current-architecture-analysis.md"
            format: "structured_markdown"
            sections:
              - project_overview
              - technical_architecture
              - database_architecture
              - api_architecture
              - code_organization
              - architecture_characteristics
              - iteration_development_recommendations

          notes: |
            架构分析是整个需求分析流程的基础。

            分析重点：
            - 自动扫描项目代码识别技术栈
            - 提取现有数据模型和 API 清单
            - 总结架构模式和编码规范
            - 为后续 PRD 和架构设计提供技术上下文

            输出的架构分析报告将被后续步骤引用：
            - PM 创建 PRD 时需要了解技术约束
            - Architect 设计增量架构时需要保持一致性

      validation_criteria:
        - architecture_analysis_complete
        - tech_stack_documented
        - existing_entities_listed
        - existing_apis_documented
        - file_created: "docs/architecture/current-architecture-analysis.md"

      on_failure:
        action: retry_analysis
        max_retries: 2
        escalation: "架构分析失败，可能需要人工介入"

      on_success:
        action: proceed_to_prd_creation
        message: "✅ 现有架构分析完成，准备创建 PRD"

      notes: |
        Architect 分析现有架构的完整流程：
        1. 执行 /architect 切换到架构师智能体
        2. 自动扫描项目代码和配置文件
        3. 识别技术栈、数据模型、API 端点
        4. 生成结构化的架构分析报告
        5. 保存到 docs/architecture/current-architecture-analysis.md

        架构分析是 Brownfield 项目的关键步骤：
        - 确保新需求与现有架构兼容
        - 识别现有技术约束
        - 为增量设计提供基础

    # ================================
    # 第3步：PM 创建 Brownfield PRD
    # ================================
    - step: create_brownfield_prd
      agent: pm
      action: create_product_requirements_document
      requires:
        - docs/req.txt
        - docs/requirements/requirements-analysis.md
        - docs/architecture/current-architecture-analysis.md
      duration: 20-30m
      detailed_steps:
        - step: switch_to_pm_agent
          command: "/pm"
          description: "切换到 PM（产品经理）智能体"
          notes: "激活产品经理角色，准备创建 Brownfield PRD"

        - step: load_requirements_and_context
          action: load_input_documents
          inputs:
            req_file: "docs/req.txt"
            architecture_analysis: "docs/architecture/current-architecture-analysis.md"
          notes: "加载 PM 提供的需求文档和架构分析报告"

        - step: execute_create_brownfield_prd
          command: "*create-brownfield-prd"
          description: "执行 *create-brownfield-prd 命令创建现有项目迭代需求的 PRD"
          action: create_prd_for_existing_project
          prompt_template: |
            我需要为现有 Java 后端项目创建一份迭代需求的 PRD 文档。

            **项目背景**：
            - 项目名称：从当前项目的实际名称（可从 pom.xml 中获取）
            - 项目类型：现有 Java 后端项目（Brownfield）
            - 技术栈：从当前项目的 docs/architecture/current-architecture-analysis.md 中获取
            - 现有功能：从当前项目的 docs/architecture/current-architecture-analysis.md 中获取功能概述

            **需求来源**：
            产品经理提供的需求文档内容如下：
            ---
            当前项目的 docs/req.txt 文档中需求内容
            ---

            **任务要求**：
            请使用 *create-brownfield-prd 命令创建 PRD 文档。

            **PRD 应包含**：
            1. 需求概述
               - 迭代背景和目标
               - 目标用户群体
               - 业务价值说明

            2. 目标用户和使用场景
               - 用户角色定义
               - 典型使用场景描述
               - 用户旅程地图

            3. 功能需求详细描述
               - 功能模块清单
               - 每个功能的详细描述
               - 业务规则和约束
               - 数据流和处理逻辑

            4. 非功能需求
               - 性能要求（响应时间、并发量）
               - 安全要求（认证、授权、数据保护）
               - 兼容性要求（浏览器、移动端、API版本）
               - 可用性和可维护性要求

            5. 技术约束（基于现有架构）
               - 必须使用的技术栈
               - 必须遵循的架构模式
               - 不能修改的现有组件
               - 技术兼容性约束

            6. 数据需求（数据库变更）
               - 新增数据表清单
               - 修改现有表的变更说明
               - 数据迁移策略
               - 数据关联关系

            7. API 需求（新增/修改的接口）
               - RESTful API 端点清单
               - 请求/响应数据结构
               - API 版本策略
               - 与现有 API 的集成点

            8. 验收标准
               - 功能验收标准（可测试、可验证）
