            - docs/architecture/database-design.md (数据库设计)
            - docs/architecture/api-design.md (API 设计)
            - docs/architecture/service-integration.md (服务集成)
            - docs/architecture/migration-plan.md (迁移计划)
            - docs/architecture/coding-standards.md (编码规范)
            - docs/architecture/tech-stack.md (技术栈)
            - docs/architecture/project-structure.md (项目结构)

            🚀 下一步：
            可以启动 automated-story-development.yaml 工作流进行用户故事开发。

            前置条件检查：
            ✅ Epic 文档已创建
            ✅ 数据库设计已完成
            ✅ 架构设计已完成

            准备就绪！可以开始用户故事自动化开发流程。

      on_success:
        message: "✅ 需求分析工作流成功完成"

      notes: |
        需求分析工作流完成：
        - 生成完成报告
        - 列出所有输出文档
        - 提供下一步指引
        - 确认 automated-story-development.yaml 的前置条件

  # ================================
  # 状态管理
  # ================================
  document_states:
    - Draft: "文档已创建，等待验证"
    - Validated: "文档已验证，质量合格"
    - Approved: "文档已批准，可以使用"

  # ================================
  # 质量门控
  # ================================
  quality_gates:
    architecture_analysis:
      required_content:
        - 技术栈清单
        - 数据库实体清单
        - API 模块清单
        - 架构模式说明
      validation_rules:
        - 技术栈识别完整
        - 现有数据表已列出
        - 现有 API 已记录
        - 编码规范已说明

    prd_creation:
      required_sections:
        - 需求概述
        - 功能需求详细描述
        - 非功能需求
        - 技术约束
        - 数据需求
        - API 需求
        - 验收标准
        - 实施计划（史诗拆分建议）
      validation_rules:
        - 所有需求已覆盖（对照 req.txt）
        - 技术约束与架构一致
        - 数据库变更明确
        - API 接口清晰
        - 验收标准可测试
        - 史诗拆分合理

    epic_sharding:
      validation_rules:
        - 史诗范围适中（2-4周）
        - 用户故事数量合理（5-15个）
        - 技术设计一致
        - 数据库变更相对独立
        - API 端点内聚

    architecture_design:
      required_content:
        - 数据模型设计（Entity + DDL）
        - API 设计（端点 + DTO）
        - Service 层设计
        - 技术决策
        - 数据库变更脚本
        - 风险和注意事项
        - 实施指导
      validation_rules:
        - 与现有架构一致
        - 数据模型合理（范式、性能）
        - API 设计符合 RESTful 规范
        - 技术风险已识别
        - 可测试性已考虑

    architecture_sharding:
      required_files:
        - docs/architecture/database-design.md
        - docs/architecture/api-design.md
        - docs/architecture/service-integration.md
        - docs/architecture/migration-plan.md
        - docs/architecture/coding-standards.md
        - docs/architecture/tech-stack.md
        - docs/architecture/project-structure.md
      validation_rules:
        - 所有7个模块文档已创建
        - 内容完整性 100%（无内容丢失）
        - 模块文档格式规范
        - 章节边界准确识别
        - 模块文档独立可读
        - 交叉引用清晰标注
        - 元数据标题包含源文档和日期

  # ================================
  # 错误处理和重试策略
  # ================================
  error_handling:
    architecture_analysis_failure:
      max_retries: 2
      escalation: "架构分析失败，可能需要人工检查项目结构"

    prd_creation_failure:
      max_retries: 2
      escalation: "PRD 创建失败，需要审查 req.txt 和架构分析质量"

    epic_sharding_failure:
      max_retries: 2
      escalation: "Epic 拆分失败，需要审查 PRD 的史诗拆分建议"

    architecture_design_failure:
      max_retries: 2
      escalation: "架构设计失败，需要人工审查 PRD 和现有架构的兼容性"

    architecture_sharding_failure:
      max_retries: 1
      escalation: "架构文档切分失败，需要检查 iteration-backend-design.md 的章节结构"

  # ================================
  # 进度追踪
  # ================================
  progress_tracking:
    metrics:
      - architecture_analysis_completed
      - prd_created
      - epics_created_count
      - architecture_design_completed
      - architecture_sharding_completed
      - module_documents_count
      - total_duration
      - identified_tables_count
      - identified_apis_count
      - identified_stories_count

    reporting:
      frequency: "每个主要步骤完成后"
      format: "markdown报告"
      location: "docs/requirements-analysis-completion-report.md"

  # ================================
  # 自动化流程图
  # ================================
  flow_diagram: |
    ```mermaid
    graph TD
        A[开始: 需求分析自动化] --> B{前置验证}
        B -->|失败| B1[提示缺失依赖]
        B -->|通过| C[Analyst: 需求分析和澄清]

        C --> D[生成需求分析报告]
        D --> E[Architect: 分析现有架构]

        E --> F[生成架构分析报告]
        F --> G[PM: 创建 Brownfield PRD]

        G --> H[执行 *create-brownfield-prd]
        H --> I{PM 自检 PRD}
        I -->|有问题| J[修复 PRD]
        J --> I
        I -->|通过| K[PRD 创建完成]

        K --> L{识别史诗清单}
        L --> M[循环: 创建每个史诗]
        M --> N[执行 *create-epic]
        N --> O{史诗质量验证}
        O -->|有问题| P[调整史诗]
        P --> O
        O -->|通过| Q[史诗创建完成]

        Q --> R{还有史诗?}
        R -->|是| M
        R -->|否| S[所有史诗创建完成]

        S --> T[Architect: 后端架构增量设计]
        T --> U[执行 *create-backend-architecture]
        U --> V{Architect 自评审}
        V -->|有问题| W[优化设计]
        W --> V
        V -->|通过| X[架构设计完成]

        X --> Y[生成数据库迁移脚本]
        Y --> Y1[Architect: 切分架构文档]
        Y1 --> Y2[执行 shard-doc 命令]
        Y2 --> Y3{验证切分质量}
        Y3 -->|有问题| Y4[调整切分]
        Y4 --> Y3
        Y3 -->|通过| Y5[切分完成: 7个模块文档]
        Y5 --> Z[生成完成报告]
        Z --> AA[🎉 需求分析完成]

        style C fill:#E6E6FA
        style E fill:#FFE4B5
        style G fill:#ADD8E6
        style M fill:#98FB98
        style T fill:#FFE4B5
        style Y1 fill:#FFE4B5
        style AA fill:#90EE90
    ```

  # ================================
  # 决策指导
  # ================================
  decision_guidance:
    when_to_use:
      - 现有 Java 后端项目的迭代需求开发
      - PM 已提供 req.txt 需求文档
      - 需要从需求到技术设计的完整自动化
      - 需要标准化的需求分析流程

    prerequisites:
      - 现有的 Java 项目代码库
      - req.txt 需求文档（由 PM 提供）
      - xiaoma-core 已安装
      - 项目基本目录结构存在

    outputs:
      - 需求分析报告
      - 现有架构分析报告
      - Brownfield PRD 文档
      - Epic 史诗文档（多个）
      - 后端架构增量设计文档
      - 数据库迁移脚本
      - 架构模块文档（7个）:
          - 数据库设计
          - API 设计
          - 服务集成
          - 迁移计划
          - 编码规范
          - 技术栈
          - 项目结构

  # ================================
  # 流程交接提示
