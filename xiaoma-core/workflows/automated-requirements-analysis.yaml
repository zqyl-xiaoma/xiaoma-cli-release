  # ================================
  workflow_integration:
    upstream_workflows:
      - none: "这是需求分析的起点工作流"
      - prerequisites:
          - req_txt_from_pm: "PM 提供的需求文档"
          - existing_java_project: "现有的 Java 项目代码库"

    downstream_workflows:
      - automated_story_development:
          trigger: "需求分析完成后"
          workflow_file: "automated-story-development.yaml"
