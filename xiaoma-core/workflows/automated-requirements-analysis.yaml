    # ================================
    # 第3步：PM 拆分史诗（循环）
    # ================================
    - step: epic_sharding_cycle
      action: create_epics_from_prd
      requires:
        - docs/prd/brownfield-iteration-prd.md
      condition: has_epics_to_create
      notes: "根据 PRD 中的史诗拆分建议，循环创建每个史诗文档"

      epic_creation_loop:
        - step: identify_next_epic
          action: determine_next_epic_to_create
          source: "docs/prd/brownfield-iteration-prd.md"
          extraction_logic: |
            从 PRD 的"实施计划（史诗拆分建议）"部分提取：
            - 史诗清单
            - 已创建的史诗（检查 docs/epics/ 目录）
            - 确定下一个待创建的史诗

          decision_logic: |
            IF 还有未创建的史诗 THEN
              继续创建下一个史诗
            ELSE
              史诗拆分完成，进入下一阶段
            END IF

          notes: "按照 PRD 建议的优先级和依赖关系顺序创建史诗"

        - step: create_single_epic
          agent: pm
          action: create_epic_document
          command: "*create-epic"
          prompt_template: |
            基于刚才创建的 PRD，我需要创建史诗。

            **史诗拆分建议**：
            根据 PRD 的功能模块，建议拆分为以下史诗：
            {从 PRD 中提取的史诗清单}

            **当前任务**：
            请为第 {epic_index} 个史诗"{epic_name}"创建史诗文档。

            **史诗信息**：
            - 史诗名称：{epic_name}
            - 史诗编号：Epic-{epic_index:02d}
            - 功能范围：{从 PRD 中提取此史诗的功能描述}
            - 业务价值：{业务价值说明}
            - 优先级：高/中/低（从 PRD 建议中获取）
            - 依赖关系：{是否依赖其他史诗，从 PRD 中获取}

            **史诗文档要求**：
            1. 史诗级别的目标和价值
               - 史诗的业务目标
               - 为用户/业务带来的价值
               - 成功标准

            2. 包含的用户故事清单（初步识别）
               - 根据功能范围识别用户故事
               - 每个故事的简要描述
               - 故事优先级
               - 故事间依赖关系

            3. 技术设计概要（针对此史诗）
               - 涉及的技术组件
               - 架构设计要点
               - 技术方案概要

            4. 数据库变更（针对此史诗）
               - 新增的数据表
               - 修改的现有表
               - 数据迁移需求

            5. API 接口清单（针对此史诗）
               - 新增的 API 端点
               - 修改的现有 API
               - API 版本策略

            6. 验收标准（史诗级别）
               - 史诗完成的验收标准
               - 关键功能验证点
               - 质量标准

            7. 估算工作量
               - 预估的故事数量
               - 预估的开发时间
               - 风险和不确定性

            8. 风险和注意事项
               - 技术风险
               - 业务风险
               - 依赖风险
               - 缓解措施

            请执行 *create-epic 命令。

          execution_process:
            phase_1: extract_epic_scope_from_prd
            phase_2: identify_user_stories
            phase_3: define_technical_design_overview
            phase_4: extract_database_changes
            phase_5: extract_api_endpoints
            phase_6: define_epic_acceptance_criteria
            phase_7: estimate_effort
