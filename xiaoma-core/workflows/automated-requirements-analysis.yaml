          notes: |
            使用 *create-epic 命令创建单个史诗：

            输入来源：
            - PRD 文档中的史诗拆分建议
            - PRD 中对应模块的详细需求

            创建流程：
            1. 从 PRD 提取史诗范围和功能描述
            2. 初步识别用户故事清单
            3. 定义技术设计概要
            4. 提取此史诗相关的数据库变更
            5. 提取此史诗相关的 API 端点
            6. 定义史诗级别的验收标准
            7. 估算工作量和识别风险
            8. 生成结构化的史诗文档

            每个史诗是一个独立的功能模块：
            - 规模适中（2-4周完成）
            - 业务价值独立
            - 包含多个用户故事
            - 可独立验收

        - step: validate_epic_quality
          action: quick_epic_validation
          validation_checks:
            - epic_scope_appropriate: "史诗规模适中"
            - user_stories_count_reasonable: "故事数量合理（5-15个）"
            - technical_design_consistent: "技术设计与架构一致"
            - database_changes_isolated: "数据库变更相对独立"
            - api_endpoints_cohesive: "API 端点内聚"

          on_issues_found:
            action: fix_epic_issues
            notes: "PM 调整史诗范围或细节"

          on_validation_passed:
            action: mark_epic_created
            message: "✅ 史诗 {epic_name} 创建完成"

          notes: "快速验证史诗质量，确保范围和内容合理"

        - step: loop_check
          description: "检查是否还有更多史诗需要创建"
          decision_logic: |
            IF 所有史诗都已创建 THEN
              退出循环，进入架构设计阶段
            ELSE
              返回 identify_next_epic 步骤，创建下一个史诗
            END IF

      validation_criteria:
        - all_suggested_epics_created
        - epic_files_exist: "docs/epics/史诗-*.md"
        - each_epic_validated

      on_failure:
        action: retry_epic_creation
        max_retries: 2
        escalation: "史诗创建失败，需要审查 PRD 的史诗拆分建议"

      on_success:
        action: proceed_to_architecture_design
        message: "✅ 所有史诗创建完成，准备进行技术架构设计"

      detailed_notes: |
        PM 拆分史诗的完整流程：
        1. 保持 PM Agent 激活状态
        2. 从 PRD 的"实施计划"部分提取史诗清单
        3. 循环创建每个史诗：
           a. 识别下一个待创建的史诗
           b. 执行 *create-epic 命令
           c. 从 PRD 提取相关内容
           d. 初步识别用户故事
           e. 定义技术设计概要和数据库/API 变更
           f. 快速验证史诗质量
           g. 保存史诗文档
        4. 所有史诗创建完成后，进入下一阶段

        史诗拆分原则：
        - 每个史诗是一个独立的功能模块
        - 规模适中（2-4周，5-15个用户故事）
        - 业务价值独立可验收
        - 技术上相对内聚
        - 考虑优先级和依赖关系

    # ================================
    # 第4步：Architect 后端架构增量设计
    # ================================
    - step: design_incremental_backend_architecture
      agent: architect
      action: create_incremental_architecture_design
      requires:
        - docs/prd/brownfield-iteration-prd.md
        - docs/epics/史诗-*.md
        - docs/architecture/current-architecture-analysis.md
      duration: 30-40m
      detailed_steps:
        - step: switch_to_architect_agent
          command: "/architect"
          description: "切换到 Architect 智能体"
          notes: "激活架构师角色，准备设计增量架构"

        - step: execute_create_backend_architecture
          command: "*create-backend-architecture"
          description: "执行 *create-backend-architecture 命令，进行后端增量架构设计"
          action: design_backend_architecture
          prompt_template: |
            基于现有系统架构，我需要设计此次迭代需求的技术实现方案。

            **现有架构**：
            当前项目的 docs/architecture/current-architecture-analysis.md 文档中架构分析报告摘要

            **新需求概述**：
            当前项目的 docs/prd/brownfield-iteration-prd.md 中功能需求摘要

            **史诗清单**：
            {列出所有已创建的史诗文件和简要描述}

            **设计任务**：
            请基于 *create-backend-architecture 命令，但聚焦于增量设计，包括：

            **1. 新增数据模型设计**：
            - 新增 Entity 实体类（Java Entity）
              - 类名、包名
              - 字段定义（类型、注解）
              - 关联关系（@OneToMany, @ManyToOne, @ManyToMany）
              - JPA/Hibernate 注解配置

            - 数据表结构设计（DDL）
              - 完整的 CREATE TABLE 语句
              - 主键、外键、索引定义
              - 字段类型、长度、默认值、注释
              - 约束条件（唯一、非空等）

            - 与现有实体的关联关系
              - 外键关系
              - 关联表设计（多对多）
              - 级联操作策略

            - 数据迁移策略
              - 新表创建脚本
              - 现有表修改脚本（ALTER TABLE）
              - 数据初始化脚本
              - 回滚方案

            **2. API 设计**：
            - 新增 RESTful API 端点列表
              - HTTP 方法（GET/POST/PUT/DELETE）
              - URL 路径设计
              - 路径参数和查询参数
              - 请求 Body 结构
              - 响应数据结构
              - HTTP 状态码

            - 请求/响应 DTO 设计
              - DTO 类名和包名
              - 字段定义和验证注解
              - DTO 与 Entity 的映射关系

            - API 版本策略（如需要）
              - 版本号规则
              - 向后兼容性保证
              - 废弃策略

            - 与现有 API 的集成点
              - 复用现有 API
              - 扩展现有 API
              - API 组合调用

            **3. 服务层设计**：
            - 新增 Service 接口和实现
              - Service 接口定义
              - 方法签名和 JavaDoc
              - 业务逻辑流程
              - Service 实现类结构

            - 业务逻辑流程图
              - 关键业务流程的流程图
              - 决策点和分支逻辑
              - 异常处理流程

            - 事务边界设计
              - 事务传播策略
              - 事务隔离级别
              - 事务回滚规则

            - 与现有服务的交互
              - 依赖的现有 Service
              - 服务间调用关系
              - 数据流转

            **4. 技术决策**：
            - 新技术/组件的引入（如需要）
              - 新增依赖说明
              - 版本选择理由
              - 与现有技术栈的兼容性

            - 性能优化策略
              - 数据库查询优化（索引、分页）
              - 缓存策略（Redis/本地缓存）
              - 异步处理（线程池、消息队列）

            - 安全性考虑
              - 认证和授权策略
              - 数据加密
              - SQL 注入防护
              - XSS 防护

            - 缓存策略
              - 缓存位置（本地/分布式）
              - 缓存粒度
              - 缓存更新策略
              - 缓存失效策略

            **5. 数据库变更脚本**：
            - 新增表的 DDL
              ```sql
              CREATE TABLE xxx (
                ...
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
              ```

            - 现有表的 ALTER 脚本
              ```sql
              ALTER TABLE xxx ADD COLUMN yyy ...;
              ALTER TABLE xxx ADD INDEX idx_zzz (...);
              ```

            - 索引优化
              - 新增索引
              - 修改索引
              - 复合索引设计

            - 数据迁移脚本
              - 数据初始化
              - 数据转换
              - 数据清理

            **6. 技术风险和注意事项**：
            - 兼容性风险
              - API 兼容性
              - 数据库向后兼容
